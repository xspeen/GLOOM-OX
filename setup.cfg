[metadata]
name = gloom-ox
version = 4.0.0
author = xspeen
author_email = xspeen@proton.me
description = Enterprise Grade Universal Media Extractor - NO LIMITS
long_description = file: docs/README.md
long_description_content_type = text/markdown
url = https://github.com/xspeen/GLOOM-OX
classifiers =
    Development Status :: 5 - Production/Stable
    Intended Audience :: End Users/Desktop
    License :: OSI Approved :: MIT License
    Operating System :: OS Independent
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3.8
    Programming Language :: Python :: 3.9
    Programming Language :: Python :: 3.10
    Programming Language :: Python :: 3.11
    Programming Language :: Python :: 3.12
    Topic :: Multimedia :: Video

[options]
packages = find:
python_requires = >=3.8
install_requires =
    yt-dlp>=2024.12.13
    requests>=2.32.0
    urllib3>=2.2.0
    browser-cookie3>=0.19.1
    mutagen>=1.47.0
    pycryptodomex>=3.20.0
    websockets>=12.0
    colorama>=0.4.6
    tqdm>=4.66.0

[options.entry_points]
console_scripts =
    gloom-ox = gloom_ox.__main__:run
    gloomox = gloom_ox.__main__:run

[options.packages.find]
exclude =
    tests*
    docs*
    assets*

[flake8]
max-line-length = 100
exclude = .git,__pycache__,docs,tests
