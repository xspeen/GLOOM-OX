name: Release - Publish to PyPI and Docker Hub

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags
  workflow_dispatch:  # Manual trigger
    inputs:
      version:
        description: 'Version to release'
        required: true
        default: '5.1.0'

jobs:
  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: GLOOM-OX v${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          gloom-ox.py
          README.md
          LICENSE
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build and publish to PyPI
  pypi-publish:
    name: Publish to PyPI
    needs: create-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gloom-ox
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: |
        python -m build
        twine check dist/*
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        packages-dir: dist/
        verbose: true

  # Build and push Docker images
  docker-publish:
    name: Publish Docker Images
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile.alpine]
        platform: [linux/amd64, linux/arm64, linux/arm/v7]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        platforms: ${{ matrix.platform }}
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/gloom-ox:${{ steps.get_version.outputs.VERSION }}
          ${{ secrets.DOCKER_USERNAME }}/gloom-ox:latest
          ${{ secrets.DOCKER_USERNAME }}/gloom-ox:${{ matrix.dockerfile == 'Dockerfile.alpine' && 'alpine' || 'standard' }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Create package for Termux
  termux-package:
    name: Create Termux Package
    needs: create-release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Create Termux package
      run: |
        mkdir -p termux-package
        cp gloom-ox.py termux-package/
        cp README.md termux-package/
        cat > termux-package/build.sh << 'EOF'
        TERMUX_PKG_HOMEPAGE=https://github.com/xspeen/GLOOM-OX
        TERMUX_PKG_DESCRIPTION="Universal Social Media Video Downloader"
        TERMUX_PKG_LICENSE="MIT"
        TERMUX_PKG_VERSION=${{ steps.get_version.outputs.VERSION }}
        TERMUX_PKG_SRCURL=https://github.com/xspeen/GLOOM-OX/archive/v${TERMUX_PKG_VERSION}.tar.gz
        TERMUX_PKG_DEPENDS="python, ffmpeg"
        termux_step_make_install() {
          pip install yt-dlp
          install -Dm700 $TERMUX_PKG_SRCDIR/gloom-ox.py $TERMUX_PREFIX/bin/gloom-ox
        }
        EOF
        tar -czf gloom-ox-termux.tar.gz termux-package/
    
    - name: Upload Termux package
      uses: actions/upload-artifact@v4
      with:
        name: termux-package
        path: gloom-ox-termux.tar.gz

  # Create Windows executable
  windows-executable:
    name: Create Windows Executable
    needs: create-release
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PyInstaller
      run: |
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Create executable
      run: |
        pyinstaller --onefile --name gloom-ox --icon assets/icon.ico gloom-ox.py
    
    - name: Upload Windows executable
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable
        path: dist/gloom-ox.exe

  # Upload all artifacts to release
  upload-artifacts:
    name: Upload Artifacts to Release
    needs: [create-release, pypi-publish, docker-publish, termux-package, windows-executable]
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
    
    - name: Upload to release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy to GitHub Pages
  deploy-docs:
    name: Deploy Documentation
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Build documentation
      run: |
        mkdir -p _site
        cp README.md _site/index.md
        cp gloom-ox.py _site/
        echo "# GLOOM-OX Documentation" > _site/README.md
    
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
