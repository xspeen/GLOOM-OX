name: GLOOM-OX CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Test GLOOM-OX Enterprise
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Speeds up future runs by caching dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          echo "❌ requirements.txt not found!"
          exit 1
        fi
    
    - name: Check Python syntax
      run: |
        # This will now pass because all 'requests', 'colorama', etc., are installed
        python -m py_compile gloom-ox.py
        echo "✅ Syntax check passed"
    
    - name: Verify Core Modules
      run: |
        python -c "import requests; import colorama; import Cryptodome; print('✅ Enterprise dependencies verified')"

    - name: Lint with ruff
      run: |
        ruff check gloom-ox.py --ignore E501
    
    - name: Final status
      run: |
        echo "═══════════════════════════════════════════════════════"
        echo "🚀 GLOOM-OX Enterprise CI completed successfully!"
        echo "═══════════════════════════════════════════════════════"
