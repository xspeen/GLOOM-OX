name: GLOOM-OX CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Test GLOOM-OX
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp pytest black ruff
    
    - name: Check Python syntax
      run: |
        python -m py_compile gloom-ox.py
        echo "✅ Syntax check passed"
    
    - name: Check file exists
      run: |
        if [ -f "gloom-ox.py" ]; then
          echo "✅ gloom-ox.py found"
          wc -l gloom-ox.py
        else
          echo "❌ gloom-ox.py not found"
          exit 1
        fi
    
    - name: Lint with ruff (fast)
      run: |
        ruff check gloom-ox.py --ignore E501 || true
    
    - name: Test import (no execution)
      run: |
        python -c "
        import sys
        import os
        sys.path.insert(0, '.')
        with open('gloom-ox.py', 'r') as f:
            content = f.read()
            if 'def main' in content:
                print('✅ Main function found')
            if 'AIBypassEngine' in content:
                print('✅ AI Bypass Engine found')
            if 'download_with_bypass' in content:
                print('✅ Bypass download function found')
        "
    
    - name: Verify version
      run: |
        grep -E "VERSION.*=.*\"[0-9]" gloom-ox.py | head -1 || echo "Version check skipped"
    
    - name: Final status
      run: |
        echo "═══════════════════════════════════════════════════════"
        echo "✅ GLOOM-OX CI completed successfully!"
        echo "═══════════════════════════════════════════════════════"
