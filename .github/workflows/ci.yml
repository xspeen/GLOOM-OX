name: GLOOM-OX CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install --no-cache-dir -r requirements.txt
        else
          echo "⚠️ requirements.txt not found, installing core packages"
          pip install pytest black ruff yt-dlp requests
        fi
        pip install pytest-cov pytest-timeout

    - name: Install FFmpeg (required for video processing)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Lint with ruff
      run: |
        ruff check . --output-format=github || true

    - name: Format check with black
      run: |
        black --check . --diff || true

    - name: Run tests with coverage
      run: |
        export PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}"
        pytest tests/ -v --tb=short --timeout=60 --cov=gloom_ox --cov-report=xml

    - name: Upload coverage report
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run bandit security linter
      run: |
        pip install bandit
        bandit -r gloom_ox/ -ll -f txt || true
