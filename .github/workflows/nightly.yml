name: Nightly Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  nightly-test:
    name: Nightly Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install latest dependencies
      run: |
        pip install --upgrade pip
        pip install --upgrade yt-dlp
    
    - name: Test script syntax
      run: |
        python -m py_compile gloom-ox.py
    
    - name: Test YouTube extraction (no download)
      run: |
        python -c "
import yt_dlp
url = 'https://youtube.com/watch?v=dQw4w9WgXcQ'
ydl_opts = {'quiet': True, 'no_warnings': True}
with yt_dlp.YoutubeDL(ydl_opts) as ydl:
    info = ydl.extract_info(url, download=False)
    print(f'Title: {info.get(\"title\", \"Unknown\")[:50]}')
    print('Extraction successful!')
"
      continue-on-error: true
    
    - name: Create report
      run: |
        echo "# Nightly Build Report - $(date)" > report.md
        echo "## Status: ${{ job.status }}" >> report.md
        echo "## yt-dlp version: $(pip show yt-dlp | grep Version)" >> report.md
        echo "## Python version: $(python --version)" >> report.md
    
    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: nightly-report
        path: report.md
        retention-days: 7
