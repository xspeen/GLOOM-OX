version: '3.8'

services:
  gloom-ox:
    image: xspeen/gloom-ox:latest
    container_name: gloom-ox-prod
    stdin_open: true
    tty: true
    volumes:
      - ./downloads:/app/downloads
      - gloom-ox-history:/root
    environment:
      - TZ=UTC
      - TERM=xterm-256color
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  gloom-ox-history:
    driver: local
